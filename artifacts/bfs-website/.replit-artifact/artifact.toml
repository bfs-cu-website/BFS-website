kind = "web"
previewPath = "/"
title = "B&FS Cotton University Website"
version = "1.0.0"
id = "artifacts/bfs-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21080

[services.development]
run = "pnpm --filter @workspace/bfs-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bfs-website", "run", "build" ]
publicDir = "artifacts/bfs-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21080"
BASE_PATH = "/"
